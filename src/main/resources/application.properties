# Nombre del microservicio
spring.application.name=backend-core

# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS (MONGODB)
# ==========================================
# Si Railway tiene la variable 'URL_MONGO_NUBE', la usará. 
# De lo contrario, usará localhost.
#spring.data.mongodb.uri=${URL_MONGO_NUBE:mongodb://localhost:27017/db_gestion_procesos}
spring.mongodb.uri=${URL_MONGO_NUBE:mongodb://localhost:27017/db_gestion_procesos}
# ==========================================
# CONFIGURACIÓN DE RED (PUERTO)
# ==========================================
server.port=${PORT:8080}
#fkflkgfogfkogfogf
# ==========================================
# LOGS DE DEPURACIÓN (MODO DETECTIVE)
# ==========================================
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO

# 2. Silenciar el "ruido" del driver de Mongo (¡MUY IMPORTANTE en Railway!)
logging.level.org.mongodb.driver.cluster=WARN
logging.level.org.mongodb.driver.connection=WARN

# 3. Desactivar el reporte de autoconfiguración inicial
logging.level.org.springframework.boot.autoconfigure.logging=INFO

# 4. Web y servidor en modo estándar
logging.level.org.apache.tomcat=INFO
logging.level.org.springframework.web=INFO

